services:
  client:
    build:
      context: .
      dockerfile: packages/client/Dockerfile
    ports:
      - "${PORT:-8080}:80"
    depends_on:
      - backend

  backend:
    build:
      context: .
      dockerfile: packages/backend/Dockerfile
    environment:
      - PORT=3000
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=chess
      - DB_PASSWORD=chess
      - DB_NAME=chess
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - SESSION_SECRET=${SESSION_SECRET:-dev-secret-change-me}
      - SENDMAIL_URL=http://external-mock:4000/mail/send
      - API_PUBLIC_URL=${API_PUBLIC_URL:-http://localhost:${PORT:-8080}/api/}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      external-mock:
        condition: service_started

  external-mock:
    build:
      context: .
      dockerfile: packages/external-mock/Dockerfile
    ports:
      - "${EXTERNAL_MOCK_PORT:-4000}:4000"

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=chess
      - POSTGRES_PASSWORD=chess
      - POSTGRES_DB=chess
    ports:
      - "${PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chess"]
      interval: 2s
      timeout: 5s
      retries: 10

  redis:
    image: redis/redis-stack-server:latest
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
