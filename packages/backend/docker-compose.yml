services:
  backend:
    build: .
    ports:
      - "${PORT:-3001}:3000"
    environment:
      - PORT=3000
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=chess
      - DB_PASSWORD=chess
      - DB_NAME=chess
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - SESSION_SECRET=test-secret
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=chess
      - POSTGRES_PASSWORD=chess
      - POSTGRES_DB=chess
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chess"]
      interval: 2s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 5s
      retries: 10
