server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Cross-origin isolation is required for SharedArrayBuffer, which enables
  # multi-threaded WASM for the in-browser chess engine. Without these two
  # headers the engine falls back to single-threaded (still works, slower).
  # `always` makes the headers emit even on error responses.
  # Note: any `add_header` in a location block REPLACES inherited server-level
  # `add_header` directives — if you add one in a location, re-declare COOP/COEP
  # there too. We keep /api/ and /socket.io/ free of these headers so proxied
  # backend responses pass through untouched.

  # static bundles are content-hashed, so they can be cached long-term
  location /assets/ {
    try_files $uri =404;
    expires 1y;
    add_header Cache-Control "public, immutable";
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "require-corp" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
  }

  # socket.io with websocket upgrade; path is preserved (no trailing slash)
  location /socket.io/ {
    proxy_pass http://backend:3000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 3600s;
  }

  # /api/* is stripped and forwarded; backend routes live at root
  location /api/ {
    proxy_pass http://backend:3000/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  # SPA history fallback
  location / {
    try_files $uri $uri/ /index.html;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "require-corp" always;
  }
}
